<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KANDYAS | ئەفسانەی زانست و پزیشکی</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Cairo:wght@400;600;700&display=swap');

        body {
            background: #05060a;
            font-family: 'Space Grotesk', 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.8rem;
            position: relative;
            overflow-x: hidden;
        }

        /* =========  پاشبنەمای ڕاقی و چولوک (شیک و ئارام) ========= */
        .royal-dark-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 30% 40%, #0a0f1c, #020308);
            overflow: hidden;
        }

        /* شەپۆلی نەرم و ئاوریشمی تاریک */
        .silent-waves {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(110deg, rgba(50, 80, 130, 0.08) 0px, rgba(50, 80, 130, 0.08) 2px, transparent 2px, transparent 12px),
                radial-gradient(circle at 20% 50%, rgba(180, 130, 255, 0.1) 0%, transparent 50%);
            animation: slowBreath 18s infinite alternate;
        }

        @keyframes slowBreath {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.02); }
        }

        /* تۆڕی زێڕینی ناسک */
        .golden-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.07) 1px, transparent 1px);
            background-size: 58px 58px;
            animation: gridFloat 24s linear infinite;
        }

        @keyframes gridFloat {
            0% { transform: translate(0, 0); }
            100% { transform: translate(58px, 58px); }
        }

        /* کانڤاسی خاڵەکانی ئاوریشم (نەرم و شیک) */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* کارتی سەرەکی - شووشەی شاهانە */
        .royal-card {
            position: relative;
            z-index: 20;
            max-width: 1350px;
            width: 100%;
            background: rgba(6, 12, 24, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 64px;
            padding: 2rem 2.2rem;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(212, 175, 55, 0.2) inset;
        }

        .royal-card:hover {
            border-color: rgba(212, 175, 55, 0.7);
            box-shadow: 0 45px 80px -20px black, 0 0 0 2px rgba(212, 175, 55, 0.4) inset;
        }

        /* هێڵی سنووری زێڕینی دەوروبەر */
        .royal-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 66px;
            background: linear-gradient(125deg, #d4af37, #b87c2e, #f5e7b2, #c9a03d);
            z-index: -1;
            opacity: 0.25;
            filter: blur(16px);
            transition: opacity 0.5s;
        }
        .royal-card:hover::after {
            opacity: 0.55;
        }

        /* پانێلی زمان - نەرم و فەرمی */
        .lang-panel {
            display: flex;
            justify-content: flex-end;
            gap: 0.9rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }

        .lang-pill {
            background: rgba(15, 22, 35, 0.7);
            border: 1px solid #d4af37;
            color: #f7e9cd;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.5rem 1.6rem;
            border-radius: 80px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(5px);
            letter-spacing: 0.5px;
        }

        .lang-pill.active {
            background: linear-gradient(115deg, #d4af37, #b37b2e);
            border-color: #fff0cc;
            color: #0b0a12;
            font-weight: 800;
            box-shadow: 0 0 18px #e6bf4a;
        }

        /* لۆگۆ - تەنها KANDYAS بە شکۆ */
        .logo-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px solid rgba(212, 175, 55, 0.5);
        }

        .logo-name {
            font-size: clamp(2.8rem, 10vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff2cc, #ffdfa5, #e6c36f, #f5e2b0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
            filter: drop-shadow(0 0 10px #d4af37);
            line-height: 1;
        }

        .royal-tag {
            font-size: 0.9rem;
            background: rgba(212, 175, 55, 0.2);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            color: #ffe4b5;
            font-family: monospace;
            border-left: 3px solid #d4af37;
        }

        /* سۆشیاڵ میدیا - بڵۆکە زێڕین و شیک */
        .social-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            margin: 2rem 0 2.5rem;
            justify-content: center;
        }

        .elegant-brick {
            background: linear-gradient(125deg, #19223c, #0c1325);
            border-radius: 56px;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            text-decoration: none;
            color: #fff6e5;
            font-size: 1.15rem;
            font-weight: 600;
            box-shadow: 0 18px 30px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(212, 175, 55, 0.5) inset;
            transition: 0.3s;
            min-width: 230px;
            flex: 1 1 230px;
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(3px);
        }

        .elegant-brick i {
            font-size: 2rem;
            filter: drop-shadow(0 0 2px #d4af37);
        }

        .elegant-brick:hover {
            transform: translateY(-8px);
            background: linear-gradient(125deg, #25345c, #121e3a);
            box-shadow: 0 28px 40px -12px #000, 0 0 0 2px #e6bf4a inset;
        }

        /* ========= چوارگۆشەکان بە دیزاینی شاز و گرادێنتی جوان ========= */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 2rem;
            margin: 2.2rem 0 2rem;
        }

        /* ستایلی چوارگۆشەکان - هێڵی گرادێنت و سێبەری شاهانە */
        .royal-tile {
            background: rgba(12, 20, 32, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 1.6rem 1.6rem;
            transition: all 0.35s ease;
            position: relative;
            border: 1px solid transparent;
            background-clip: padding-box;
            box-shadow: 0 12px 28px -12px rgba(0, 0, 0, 0.5);
        }

        /* هێڵی گرادێنتی دەوروبەر (border gradient) */
        .royal-tile::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 36px;
            padding: 2px;
            background: linear-gradient(125deg, #d4af37, #f5e7b2, #b87c2e, #ffdf95);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.65;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .royal-tile:hover::before {
            opacity: 1;
            background: linear-gradient(125deg, #ffd966, #ffbc6e, #e6bf4a, #ffe5aa);
        }

        .royal-tile:hover {
            transform: translateY(-8px);
            background: rgba(16, 28, 42, 0.75);
            box-shadow: 0 28px 40px -15px black;
        }

        .tile-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #ffeaae;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .tile-header i {
            font-size: 1.5rem;
            background: linear-gradient(145deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tile-content {
            color: #ffffff;
            font-size: 1.7rem;
            font-weight: 600;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.7rem;
        }

        /* بەشی تەمەن و بەروار بە شێوەیەکی ڕێک و پێک */
        .age-block {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .age-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff5cf, #c8ffd0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .birth-text {
            font-size: 1rem;
            font-family: monospace;
            background: rgba(0, 30, 35, 0.6);
            padding: 0.2rem 1rem;
            border-radius: 60px;
            display: inline-block;
            border-left: 3px solid #ffcd7e;
        }

        /* تایبەت بە ڕەنگی سەوز - گەوهەری */
        .green-chip {
            background: linear-gradient(145deg, #0f7a4a, #0b5a38);
            display: inline-block;
            padding: 0.2rem 1.8rem;
            border-radius: 80px;
            font-size: 1.6rem;
            border: 1px solid #b5ffb0;
            box-shadow: 0 0 24px #70ffb0;
            color: #f0fff0;
            font-weight: 700;
        }

        .skill-pack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 0.2rem;
        }

        .skill-tag {
            background: rgba(20, 45, 55, 0.8);
            border: 1px solid #e6bf4a;
            color: #fff7e8;
            padding: 0.4rem 1.3rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            transition: 0.2s;
        }

        .skill-tag.special-tag {
            background: #1b5f66c9;
            border-color: #aafff0;
        }

        .skill-tag:hover {
            background: #ffbc6e;
            color: #0f1a1a;
            transform: scale(1.02);
        }

        /* فووتهری سێ بەش (ئیسلام، پزیشکی، سەوز) */
        .footer-royal {
            margin-top: 2rem;
            padding: 1.1rem 1.8rem;
            background: rgba(8, 18, 24, 0.7);
            border-radius: 56px;
            border: 1px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            backdrop-filter: blur(8px);
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            font-size: 1rem;
            font-weight: 500;
            background: rgba(0,0,0,0.3);
            padding: 0.4rem 1.3rem;
            border-radius: 60px;
            color: #ffefcf;
        }

        .footer-item i {
            font-size: 1.4rem;
            color: #ffda88;
        }

        /* هیچ وتەی زیادە نییە، هەموو ئەو شتانەی داواکرا لابران */
        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .royal-card {
                padding: 1.4rem;
            }
            .tile-content {
                font-size: 1.3rem;
            }
            .green-chip {
                font-size: 1.2rem;
                padding: 0.2rem 1rem;
            }
            .age-number {
                font-size: 1.6rem;
            }
            .profile-grid {
                gap: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="royal-dark-bg">
        <div class="silent-waves"></div>
        <div class="golden-grid"></div>
        <canvas id="particle-canvas"></canvas>
    </div>

    <div class="royal-card">
        <!-- زمانەکان -->
        <div class="lang-panel">
            <button class="lang-pill active" data-lang="ku">کوردی</button>
            <button class="lang-pill" data-lang="ar">عربي</button>
            <button class="lang-pill" data-lang="en">English</button>
        </div>

        <!-- لۆگۆ - تەنها ناو و بەرچاو، بێ whoami زیادە -->
        <div class="logo-area">
            <span class="logo-name">KANDYAS</span>
            <span class="royal-tag"><i class="fas fa-crown"></i>  elegance</span>
        </div>

        <!-- سۆشیاڵ میدیا -->
        <div class="social-row">
            <a href="https://t.me/i4m_SHAW" target="_blank" class="elegant-brick">
                <i class="fab fa-telegram-plane"></i>
                <span data-i18n="telegram_user">@i4m_SHAW</span>
            </a>
            <a href="https://tiktok.com/@kandyasm" target="_blank" class="elegant-brick">
                <i class="fab fa-tiktok"></i>
                <span data-i18n="tiktok_user">@kandyasm</span>
            </a>
            <a href="https://t.me/Kurds_Movies" target="_blank" class="elegant-brick">
                <i class="fab fa-telegram-plane"></i>
                <span data-i18n="channel_name">Kurds_Movies</span>
            </a>
        </div>

        <!-- چوارگۆشەکان بە دیزاینی شاز و هێڵی گرادێنت -->
        <div class="profile-grid">
            <!-- ناو -->
            <div class="royal-tile">
                <div class="tile-header"><i class="fas fa-feather-alt"></i> <span data-i18n="name_header">ناو</span></div>
                <div class="tile-content" data-i18n="name_display">Kandyas</div>
            </div>

            <!-- تەمەن و بەروار جیا کراوە -->
            <div class="royal-tile">
                <div class="tile-header"><i class="fas fa-hourglass-half"></i> <span data-i18n="age_header">تەمەن & لەدایکبوون</span></div>
                <div class="tile-content">
                    <div class="age-block">
                        <span class="age-number" data-i18n="age_years">١٩ ساڵ</span>
                        <span class="birth-text" data-i18n="birth_date">لەدایکبوون: ١٨ی حوزەیران</span>
                    </div>
                </div>
            </div>

            <!-- ڕەنگی دڵخواز - سەوز -->
            <div class="royal-tile">
                <div class="tile-header"><i class="fas fa-spa"></i> <span data-i18n="color_header">ڕەنگی دڵخواز</span></div>
                <div class="tile-content"><span class="green-chip" data-i18n="color_display">💚 سەوز</span></div>
            </div>

            <!-- شارەزایی تەکنیکی -->
            <div class="royal-tile">
                <div class="tile-header"><i class="fas fa-code"></i> <span data-i18n="skills_header">شارەزایی</span></div>
                <div class="skill-pack">
                    <span class="skill-tag">Python</span>
                    <span class="skill-tag">C</span>
                    <span class="skill-tag">C++</span>
                    <span class="skill-tag">HTML/CSS</span>
                    <span class="skill-tag special-tag">دیکۆدینگ</span>
                    <span class="skill-tag special-tag">کۆدینگ</span>
                </div>
            </div>

            <!-- ئایین -->
            <div class="royal-tile">
                <div class="tile-header"><i class="fas fa-mosque"></i> <span data-i18n="religion_header">دین</span></div>
                <div class="tile-content" data-i18n="religion_display">ئیسلام</div>
            </div>

            <!-- خوێندن: پزیشکی -->
            <div class="royal-tile">
                <div class="tile-header"><i class="fas fa-stethoscope"></i> <span data-i18n="study_header">ئاراستە</span></div>
                <div class="tile-content" data-i18n="study_display">پزیشکی</div>
            </div>
        </div>

        <!-- فووتهری سێ بەش (ئیسلام، پزیشکی، سەوز) -->
        <div class="footer-royal">
            <div class="footer-item"><i class="fas fa-crescent-moon"></i> <span data-i18n="footer_islam">ئیسلام</span></div>
            <div class="footer-item"><i class="fas fa-user-md"></i> <span data-i18n="footer_medicine">پزیشکی</span></div>
            <div class="footer-item"><i class="fas fa-leaf"></i> <span data-i18n="footer_green_only">سەوز 💚</span></div>
        </div>
        <!-- هیچ وتەی کۆتایی / whoami زیادە نییە -->
    </div>

    <script>
        (function() {
            // فەرهەنگی وەرگێڕان (بە پێی داوا)
            const dict = {
                ku: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_name: "Kurds_Movies",
                    name_header: "ناو",
                    age_header: "تەمەن & لەدایکبوون",
                    color_header: "ڕەنگی دڵخواز",
                    skills_header: "شارەزایی",
                    religion_header: "دین",
                    study_header: "ئاراستە",
                    name_display: "Kandyas",
                    age_years: "١٩ ساڵ",
                    birth_date: "لەدایکبوون: ١٨ی حوزەیران",
                    color_display: "💚 سەوز",
                    religion_display: "ئیسلام",
                    study_display: "پزیشکی",
                    footer_islam: "ئیسلام",
                    footer_medicine: "پزیشکی",
                    footer_green_only: "سەوز 💚"
                },
                ar: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_name: "Kurds_Movies",
                    name_header: "الاسم",
                    age_header: "العمر & تاريخ الميلاد",
                    color_header: "اللون المفضل",
                    skills_header: "الخبرات",
                    religion_header: "الدين",
                    study_header: "التخصص",
                    name_display: "Kandyas",
                    age_years: "١٩ سنة",
                    birth_date: "الميلاد: ١٨ حزيران",
                    color_display: "💚 أخضر",
                    religion_display: "الإسلام",
                    study_display: "الطب",
                    footer_islam: "الإسلام",
                    footer_medicine: "الطب",
                    footer_green_only: "أخضر 💚"
                },
                en: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_name: "Kurds_Movies",
                    name_header: "NAME",
                    age_header: "AGE & BIRTH",
                    color_header: "FAV COLOR",
                    skills_header: "EXPERTISE",
                    religion_header: "RELIGION",
                    study_header: "FIELD",
                    name_display: "Kandyas",
                    age_years: "19 years",
                    birth_date: "Born: June 18",
                    color_display: "💚 Green",
                    religion_display: "Islam",
                    study_display: "Medicine",
                    footer_islam: "Islam",
                    footer_medicine: "Medicine",
                    footer_green_only: "Green 💚"
                }
            };

            function switchLang(lang) {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.dataset.i18n;
                    if (dict[lang] && dict[lang][key] !== undefined) {
                        el.innerText = dict[lang][key];
                    }
                });
                document.querySelectorAll('.lang-pill').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === lang);
                });
            }

            document.querySelectorAll('.lang-pill').forEach(btn => {
                btn.addEventListener('click', e => {
                    const lang = e.currentTarget.dataset.lang;
                    switchLang(lang);
                });
            });
            switchLang('ku');

            // پارتیکڵەکانی پاشبنەما - شیک و نەرم (ڕەنگە زێڕین و شینی ناسک)
            const canvas = document.getElementById('particle-canvas');
            let ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const PARTICLE_COUNT = 140;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        rad: Math.random() * 2.5 + 1.2,
                        alpha: Math.random() * 0.45 + 0.15,
                        vx: (Math.random() - 0.5) * 0.12,
                        vy: (Math.random() - 0.5) * 0.08,
                        phase: Math.random() * Math.PI * 2,
                        colorType: Math.random() > 0.6 ? 'gold' : 'blue'
                    });
                }
            }

            function drawParticles() {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                const now = Date.now();
                for (let p of particles) {
                    ctx.beginPath();
                    let glow = 0.5 + Math.sin(now * 0.0015 + p.phase) * 0.35;
                    let hue = p.colorType === 'gold' ? 45 : 210;
                    let sat = p.colorType === 'gold' ? 75 : 65;
                    let light = 65 + glow * 15;
                    ctx.arc(p.x, p.y, p.rad + glow * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${p.alpha * 0.6})`;
                    ctx.fill();
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = `hsla(${hue}, 85%, 65%, 0.5)`;
                    ctx.fillStyle = `hsla(${hue}, ${sat}%, 70%, ${p.alpha * 0.5})`;
                    ctx.arc(p.x, p.y, p.rad * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < -30) p.x = width + 30;
                    if (p.x > width + 30) p.x = -30;
                    if (p.y < -30) p.y = height + 30;
                    if (p.y > height + 30) p.y = -30;
                }
                requestAnimationFrame(drawParticles);
            }

            window.addEventListener('resize', () => resizeCanvas());
            resizeCanvas();
            drawParticles();
        })();
    </script>
</body>
</html>
