<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANDYAS | UNIVERSE</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        body {
            background: #05080c;
            font-family: 'Space Grotesk', 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* vibrant animated background */
        .galaxy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 70% 40%, #1b2e4f 0%, #0a0f19 60%);
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 15px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 72px 430px, #ffb3d9, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 550px 210px, #b1f0ff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 890px 620px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 100px 850px, #ffdbb5, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 300px 950px, #c3a5ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 1200px 250px, #b0ffcf, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 1400px 700px, #ffb8b8, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.8;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* main card - colorful glass */
        .prism-card {
            position: relative;
            z-index: 20;
            max-width: 1300px;
            width: 100%;
            background: rgba(15, 20, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 140, 200, 0.3);
            border-radius: 56px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(200, 100, 255, 0.2) inset, 0 0 80px #8a2be280;
            padding: 2.8rem 2.8rem;
        }

        /* language selector */
        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .lang-choice {
            background: rgba(30, 20, 50, 0.7);
            border: 1.8px solid #ba7aff;
            color: #f0dbff;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.25s;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        .lang-choice.active {
            background: #c86eff;
            border-color: #ffd7fc;
            color: #0b0a1a;
            font-weight: 800;
            box-shadow: 0 0 30px #f0f;
        }

        .lang-choice:hover {
            border-color: #f3aaff;
            background: #6b3b9e;
            color: white;
        }

        /* logo area - clean, no extra text */
        .logo-banner {
            margin-bottom: 2.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-left: 8px solid #ff66c4;
            padding-left: 2.2rem;
            background: linear-gradient(90deg, rgba(255,105,180,0.2) 0%, transparent 100%);
            border-radius: 0 60px 60px 0;
        }

        .logo-big {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffb3d9, #c289f0, #7ad0ff, #b0ffb0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: -2px;
            filter: drop-shadow(0 0 25px #ff90e5);
            line-height: 1;
        }

        /* social bricks - all identical now */
        .social-cluster {
            display: flex;
            flex-wrap: wrap;
            gap: 2.2rem;
            margin: 3rem 0 3rem;
            justify-content: center;
        }

        .cool-brick {
            background: linear-gradient(145deg, #3b3b9a, #20207a);
            border: none;
            border-radius: 28px;
            padding: 1.5rem 2.5rem;
            display: flex;
-align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 20px 35px -5px #0a0f2e, 0 0 0 3px #b3a0ff inset, 0 -5px 0 #1e1f6e inset;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 250px;
            flex: 1 1 250px;
            font-family: 'Space Grotesk', sans-serif;
            border-bottom: 4px solid #3030b3;
        }

        .cool-brick i {
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px black);
        }

        /* all bricks same style (no more channel distinction) */
        .cool-brick:hover {
            transform: translateY(-12px) scale(1.02);
            background: linear-gradient(145deg, #4f4fc9, #2a2a9e);
            box-shadow: 0 35px 45px -8px #1b1b4b, 0 0 0 5px #eac8ff inset;
        }

        /* info grid - colorful */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 2rem;
            margin: 2.5rem 0 2.5rem;
        }

        .data-cell {
            background: rgba(20, 15, 40, 0.7);
            backdrop-filter: blur(10px);
            border: 1.8px solid;
            border-image-slice: 1;
            border-radius: 36px;
            padding: 1.6rem 1.8rem;
            transition: 0.3s;
            box-shadow: 0 18px 30px -10px black;
            border-color: #a64dff;
        }

        .data-cell:nth-child(1) { border-color: #ff66a3; }
        .data-cell:nth-child(2) { border-color: #6ee7ff; }
        .data-cell:nth-child(3) { border-color: #a6ffa6; }
        .data-cell:nth-child(4) { border-color: #ffb86b; }
        .data-cell:nth-child(5) { border-color: #ff99cc; }
        .data-cell:nth-child(6) { border-color: #b380ff; }

        .data-cell:hover {
            transform: scale(1.02) translateY(-6px);
            box-shadow: 0 0 35px #c397ff;
        }

        .cell-head {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #e2d1ff;
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            font-family: 'Orbitron', sans-serif;
        }

        .cell-head i {
            font-size: 1.8rem;
            color: #ffb3d9;
        }

        .cell-body {
            color: #fefefe;
            font-size: 2rem;
            font-weight: 700;
            padding-left: 0.4rem;
            line-height: 1.3;
        }

        /* age & birth separated now */
        .age-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .age-row {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .age-label {
            font-size: 1rem;
            color: #aed7ff;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            background: #2b2350;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }
        .age-number {
            font-size: 1.9rem;
            font-weight: 700;
            color: #ffe9b0;
        }

        /* green favorite color - normal text, no glow */
        .green-plain {
            color: #aaffaa;
            font-size: 2rem;
            font-weight: 600;
            text-shadow: 0 0 0 transparent;
            background: transparent;
            padding: 0;
            display: inline;
            border: none;
            box-shadow: none;
        }

        /* skills container - decoding & coding moved to separate table */
        .skills-box {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .lang-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
        }
        .lang-tag {
            background: #333366;
            border: 1px solid #aaaaff;
            color: #f0f0ff;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            transition: 0.2s;
        }
        .lang-tag:hover { background: #5656b3; }

        /* separate table for decoding/coding */
        .decode-table {
            margin-top: 0.5rem;
            background: #1f1f3a;
            border-radius: 28px;
            padding: 1.2rem 1.2rem;
            border: 2px dashed #b57cff;
            width: 100%;
        }
        .decode-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.5rem;
            padding: 0.3rem 0;
        }
        .decode-icon {
            color: #c98eff;
            font-size: 1.8rem;
            width: 2rem;
        }
        .decode-text {
            color: #ffe1b0;
            font-weight: 600;
            font-family: 'Orbitron', monospace;
        }
        /* no translation for decode texts, they stay as is */

        /* footer without extra line */
        .signature-line {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 2px solid #a05eff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            color: #d0c0ff;
            font-size: 1.3rem;
            font-family: 'Orbitron', monospace;
        }

        .signature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(80, 40, 130, 0.5);
            padding: 0.6rem 2rem;
            border-radius: 60px;
            border: 1px solid #ffa0f0;
        }

        .signature-item i {
            color: #ffacf0;
            font-size: 1.8rem;
        }

        /* unique colorful touches */
        .color-dots {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }
        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff66b2;
            box-shadow: 0 0 20px currentColor;
        }
        .dot:nth-child(2) { background: #6effb0; }
        .dot:nth-child(3) { background: #9f7aff; }
        .dot:nth-child(4) { background: #ffdb7a; }

        @media (max-width: 700px) {
            .prism-card { padding: 1.5rem; }
            .logo-big { font-size: 4.5rem; }
        }
    </style>
</head>
<body>
    <div class="galaxy-bg">
        <div class="stars"></div>
    </div>

    <div class="prism-card">
        <!-- language pills -->
        <div class="lang-switcher">
            <button class="lang-choice active" data-lang="ku">کوردی</button>
            <button class="lang-choice" data-lang="ar">عربي</button>
            <button class="lang-choice" data-lang="en">English</button>
        </div>

        <!-- logo - clean, no extra text -->
        <div class="logo-banner">
            <span class="logo-big">KANDYAS</span>
        </div>

        <!-- social bricks (all identical) -->
        <div class="social-cluster">
            <a href="https://t.me/i4m_SHAW" target="_blank" class="cool-brick">
                <i class="fab fa-telegram"></i>
                <span data-i18n="telegram_user">@i4m_SHAW</span>
            </a>
            <a href="https://tiktok.com/@kandyasm" target="_blank" class="cool-brick">
                <i class="fab fa-tiktok"></i>
                <span data-i18n="tiktok_user">@kandyasm</span>
            </a>
            <a href="https://t.me/Kurds_Movies" target="_blank" class="cool-brick">
                <i class="fab fa-telegram"></i>
                <span data-i18n="channel_user">Kurds_Movies</span>
            </a>
        </div>

        <!-- main info grid -->
        <div class="data-grid">
            <!-- name -->
            <div class="data-cell">
                <div class="cell-head"><i class="fas fa-user-astronaut"></i> <span data-i18n="name_head">NAW</span></div>
                <div class="cell-body" data-i18n="name_body">Kandyas</div>
            </div>

            <!-- age and birth separated -->
            <div class="data-cell">
                <div class="cell-head"><i class="fas fa-calendar-alt"></i> <span data-i18n="age_head">TEMEN</span></div>
                <div class="age-group">
                    <div class="age-row">
                        <span class="age-label" data-i18n="age_label">TEMEN</span>
                        <span class="age-number" data-i18n="age_value">19 ساڵ</span>
                    </div>
                    <div class="age-row">
                        <span class="age-label" data-i18n="birth_label">لەدایکبوون</span>
                        <span class="age-number" data-i18n="birth_value">18/6</span>
                    </div>
                </div>
            </div>

            <!-- favorite color - plain green text, no glow, no box -->
            <div class="data-cell">
                <div class="cell-head"><i class="fas fa-heart" style="color: #7affa0;"></i> <span data-i18n="color_head">COLOUR</span></div>
                <div class="cell-body"><span class="green-plain" data-i18n="color_body">💚 سەوز</span></div>
            </div>

            <!-- expertise area: programming languages (translatable) + separate decoding/coding table -->
            <div class="data-cell">
                <div class="cell-head"><i class="fas fa-code"></i> <span data-i18n="skills_head">EXPERTISE</span></div>
                <div class="skills-box">
                    <div class="lang-skills">
                        <span class="lang-tag">Python</span>
                        <span class="lang-tag">C</span>
                        <span class="lang-tag">C++</span>
                        <span class="lang-tag">HTML</span>
                        <span class="lang-tag">CSS</span>
                    </div>
                    <!-- separate decoding/coding table, never translated -->
                    <div class="decode-table">
                        <div class="decode-row">
                            <i class="fas fa-microchip decode-icon"></i>
                            <span class="decode-text">دیکۆدینگ</span>
                        </div>
                        <div class="decode-row">
                            <i class="fas fa-keyboard decode-icon"></i>
                            <span class="decode-text">کۆدینگ</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- religion islam -->
            <div class="data-cell">
                <div class="cell-head"><i class="fas fa-mosque"></i> <span data-i18n="religion_head">DIN</span></div>
                <div class="cell-body" data-i18n="religion_body">ئیسلام</div>
            </div>

            <!-- medicine -->
            <div class="data-cell">
                <div class="cell-head"><i class="fas fa-stethoscope"></i> <span data-i18n="study_head">ARASTE</span></div>
                <div class="cell-body" data-i18n="study_body">پزیشکی</div>
            </div>
        </div>

        <!-- signature footer: only "created by @i4m_SHAW © 2026" -->
        <div class="signature-line">
            <div class="signature-item">
                <i class="fas fa-bolt"></i>
                <span>created by @i4m_SHAW © 2026</span>
                <i class="fas fa-crown"></i>
            </div>
        </div>

        <!-- small decorative dots -->
        <div class="color-dots">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
    </div>

    <script>
        (function() {
            const translations = {
                ku: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_user: "Kurds_Movies",
                    name_head: "ناو",
                    age_head: "تەمەن",
                    color_head: "ڕەنگی دڵخواز",
                    skills_head: "شارەزایی",
                    religion_head: "دین",
                    study_head: "ئاراستە",
                    name_body: "Kandyas",
                    age_label: "تەمەن",
                    age_value: "١٩ ساڵ",
                    birth_label: "لەدایکبوون",
                    birth_value: "١٨/٦",
                    color_body: "💚 سەوز",
                    religion_body: "ئیسلام",
                    study_body: "پزیشکی",
                },
                ar: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_user: "Kurds_Movies",
                    name_head: "الاسم",
                    age_head: "العمر",
                    color_head: "اللون المفضل",
                    skills_head: "المهارات",
                    religion_head: "الدين",
                    study_head: "التخصص",
                    name_body: "Kandyas",
                    age_label: "العمر",
                    age_value: "١٩ سنة",
                    birth_label: "الميلاد",
                    birth_value: "١٨/٦",
                    color_body: "💚 أخضر",
                    religion_body: "الإسلام",
                    study_body: "طب",
                },
                en: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_user: "Kurds_Movies",
                    name_head: "NAME",
                    age_head: "AGE",
                    color_head: "FAV COLOR",
                    skills_head: "EXPERTISE",
                    religion_head: "RELIGION",
                    study_head: "FIELD",
                    name_body: "Kandyas",
                    age_label: "Age",
                    age_value: "19 years",
                    birth_label: "Birth",
                    birth_value: "18/6",
                    color_body: "💚 Green",
                    religion_body: "Islam",
                    study_body: "Medicine",
                }
            };

            function setLang(lang) {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[lang] && translations[lang][key] !== undefined) {
                        el.innerText = translations[lang][key];
                    }
                });

                document.querySelectorAll('.lang-choice').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === lang);
                });
            }

            document.querySelectorAll('.lang-choice').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const lang = e.currentTarget.dataset.lang;
                    setLang(lang);
                });
            });

            setLang('ku');
        })();
    </script>
</body>
</html>
