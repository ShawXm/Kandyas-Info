<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANDYAS | CYBER PROFILE</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            background: #0a0c0f;
            font-family: 'Space Grotesk', 'JetBrains Mono', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* animated cyber background */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 20% 50%, #1b2f3f 0%, #0a0e14 50%);
        }

        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 200, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 200, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 12s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* main card - dark glass */
        .neo-card {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            width: 100%;
            background: rgba(8, 15, 18, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 200, 0.25);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(0, 255, 200, 0.15) inset, 0 0 50px #00ffff1a;
            padding: 2.8rem 2.5rem;
        }

        /* language pills */
        .lang-panel {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .lang-pill {
            background: rgba(15, 30, 30, 0.8);
            border: 1.5px solid #2f7f78;
            color: #bcfff0;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.6rem 1.8rem;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.8px;
        }

        .lang-pill.active {
            background: #00ddb3;
            border-color: #a3ffea;
            color: #03100e;
            font-weight: 700;
            box-shadow: 0 0 25px #00ffc3;
        }

        .lang-pill:hover {
            border-color: #4effd8;
            color: #ffffff;
            transform: scale(1.02);
        }

        /* logo with proper fit */
        .logo-section {
            margin-bottom: 2.5rem;
            display: flex;
            align-items: baseline;
            gap: 1rem;
            border-left: 5px solid #00ffd0;
            padding-left: 2rem;
        }

        .logo-name {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(130deg, #c0fff0, #6effe5, #00ffc3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -2px;
            filter: drop-shadow(0 0 20px #00ffee);
            line-height: 1;
        }

        .logo-prompt {
            color: #4b6e68;
            font-size: 1.2rem;
            font-family: 'JetBrains Mono', monospace;
        }

        /* social bricks - perfect blue */
        .social-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin: 3rem 0 3rem;
            justify-content: center;
        }

        .blue-brick {
            background: linear-gradient(160deg, #0066ff, #0039b3);
            border: none;
            border-radius: 28px;
            padding: 1.4rem 2.2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            box-shadow: 0 18px 30px -8px #001544, 0 0 0 2px #7fc9ff inset, 0 -4px 0 #00218f inset;
            transition: 0.2s ease;
            min-width: 250px;
            flex: 1 1 250px;
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 3px solid #002ba6;
        }

        .blue-brick i {
            font-size: 2.8rem;
            filter: drop-shadow(2px 4px 5px black);
        }

        .blue-brick.channel-brick {
            background: linear-gradient(160deg, #1f4590, #10245a);
            box-shadow: 0 18px 30px -8px #000f33, 0 0 0 2px #74bdff inset;
        }

        .blue-brick:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 40px -8px #001a57, 0 0 0 4px #b2e4ff inset;
        }

        /* info grid - clean and aligned */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
            margin: 2.8rem 0 2.8rem;
        }

        .info-tile {
            background: rgba(10, 22, 22, 0.6);
            backdrop-filter: blur(8px);
            border: 1.2px solid #1f8a7a;
            border-radius: 30px;
            padding: 1.6rem 1.8rem;
            transition: 0.3s;
            box-shadow: 0 15px 25px -12px #000000;
        }

        .info-tile:hover {
            border-color: #00ffd0;
            box-shadow: 0 0 30px #00ffc310;
            background: rgba(0, 30, 28, 0.7);
        }

        .tile-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #5effe6;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .tile-header i {
            font-size: 1.5rem;
            color: #00ffc3;
        }

        .tile-content {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 600;
            padding-left: 0.3rem;
            word-break: break-word;
        }

        /* special green colour block - only for fav color */
        .green-chip {
            background: #0c472c;
            display: inline-block;
            padding: 0.3rem 2rem;
            border-radius: 80px;
            font-size: 1.8rem;
            border: 2px solid #1aff9e;
            box-shadow: 0 0 30px #00ff95;
            color: #f0fff0;
            font-weight: 600;
        }

        /* skill tags - all non-language specific */
        .skill-pack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1rem;
            margin-top: 0.3rem;
        }

        .skill-tag {
            background: #13302b;
            border: 1px solid #17c9b0;
            color: #defff5;
            padding: 0.4rem 1.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.3px;
            transition: 0.2s;
        }

        .skill-tag:hover {
            background: #00b8a0;
            color: #030f0e;
        }

        /* decoding & coding tags - neutral, no translation */
        .skill-tag.special-tag {
            background: #193a44;
            border-color: #3aceff;
            color: #e0f5ff;
        }

        /* footer - only requested items */
        .footer-strip {
            margin-top: 2.5rem;
            padding: 1.5rem 2rem;
            background: rgba(0, 15, 15, 0.7);
            border-radius: 50px;
            border: 1px solid #00bc9c;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            color: #b8ffee;
            font-size: 1.2rem;
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(5px);
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .footer-item i {
            color: #1effd0;
            font-size: 1.7rem;
        }

        /* unique decoration */
        .cyber-line {
            text-align: right;
            margin-top: 1.5rem;
            color: #00aa99;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            opacity: 0.5;
            letter-spacing: 3px;
        }

        /* fix for name fitting inside tile */
        .tile-content span {
            display: inline-block;
            max-width: 100%;
            overflow-wrap: break-word;
        }

        @media (max-width: 700px) {
            .neo-card { padding: 1.8rem; }
            .logo-name { font-size: 3.8rem; }
            .tile-content { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="cyber-bg">
        <div class="grid-overlay"></div>
    </div>

    <div class="neo-card">
        <!-- language selector - clean -->
        <div class="lang-panel">
            <button class="lang-pill active" data-lang="ku">کوردی</button>
            <button class="lang-pill" data-lang="ar">عربي</button>
            <button class="lang-pill" data-lang="en">English</button>
        </div>

        <!-- logo - perfect fit -->
        <div class="logo-section">
            <span class="logo-name">KANDYAS</span>
            <span class="logo-prompt">$ whoami</span>
        </div>

        <!-- social bricks - blue only -->
        <div class="social-row">
            <a href="https://t.me/i4m_SHAW" target="_blank" class="blue-brick">
                <i class="fab fa-telegram-plane"></i>
                <span data-i18n="telegram_user">@i4m_SHAW</span>
            </a>
            <a href="https://tiktok.com/@kandyasm" target="_blank" class="blue-brick">
                <i class="fab fa-tiktok"></i>
                <span data-i18n="tiktok_user">@kandyasm</span>
            </a>
            <a href="https://t.me/Kurds_Movies" target="_blank" class="blue-brick channel-brick">
                <i class="fab fa-telegram-plane"></i>
                <span data-i18n="channel_name">Kurds_Movies</span>
            </a>
        </div>

        <!-- personal information grid - everything neatly organized -->
        <div class="profile-grid">
            <!-- name tile -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-user"></i> <span data-i18n="name_header">NAW</span></div>
                <div class="tile-content" data-i18n="name_display">Kandyas</div>
            </div>

            <!-- age & birth -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-calendar"></i> <span data-i18n="age_header">TEMEN / BIRTH</span></div>
                <div class="tile-content" data-i18n="age_display">19 · 18/6</div>
            </div>

            <!-- favourite color - green only -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-heart" style="color: #5affa5;"></i> <span data-i18n="color_header">COLOUR</span></div>
                <div class="tile-content"><span class="green-chip" data-i18n="color_display">💚 سەوز</span></div>
            </div>

            <!-- expertise - with decoding/coding as fixed text (not language dependent) -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-code"></i> <span data-i18n="skills_header">EXPERTISE</span></div>
                <div class="skill-pack">
                    <span class="skill-tag">Python</span>
                    <span class="skill-tag">C</span>
                    <span class="skill-tag">C++</span>
                    <span class="skill-tag">HTML</span>
                    <span class="skill-tag">CSS</span>
                    <!-- these two are not translated, stay same in all languages -->
                    <span class="skill-tag special-tag">دیکۆدینگ</span>
                    <span class="skill-tag special-tag">کۆدینگ</span>
                </div>
            </div>

            <!-- religion islam -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-mosque"></i> <span data-i18n="religion_header">DIN</span></div>
                <div class="tile-content" data-i18n="religion_display">ئیسلام</div>
            </div>

            <!-- medicine aspiration -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-stethoscope"></i> <span data-i18n="study_header">ARASTE</span></div>
                <div class="tile-content" data-i18n="study_display">پزیشکی</div>
            </div>
        </div>

        <!-- footer - only islam, medicine, green - nothing else -->
        <div class="footer-strip">
            <div class="footer-item"><i class="fas fa-crescent-moon"></i> <span data-i18n="footer_islam">ئیسلام</span></div>
            <div class="footer-item"><i class="fas fa-user-md"></i> <span data-i18n="footer_medicine">پزیشکی</span></div>
            <div class="footer-item"><i class="fas fa-heart" style="color: #4effa5;"></i> <span data-i18n="footer_green_only">سەوز 💚</span></div>
        </div>

        <!-- small cyberpunk detail -->
        <div class="cyber-line">❯_ KANDYAS@profile ~ $ █</div>
    </div>

    <script>
        (function() {
            // pure translations - exactly as required
            const dict = {
                ku: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_name: "Kurds_Movies",
                    name_header: "ناو",
                    age_header: "تەمەن / لەدایکبوون",
                    color_header: "ڕەنگی دڵخواز",
                    skills_header: "شارەزایی",
                    religion_header: "دین",
                    study_header: "ئاراستە",
                    name_display: "Kandyas",
                    age_display: "١٩ · ١٨/٦",
                    color_display: "💚 سەوز",
                    religion_display: "ئیسلام",
                    study_display: "پزیشکی",
                    footer_islam: "ئیسلام",
                    footer_medicine: "پزیشکی",
                    footer_green_only: "سەوز 💚",
                },
                ar: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_name: "Kurds_Movies",
                    name_header: "الاسم",
                    age_header: "العمر / الميلاد",
                    color_header: "اللون المفضل",
                    skills_header: "المهارات",
                    religion_header: "الدين",
                    study_header: "التخصص",
                    name_display: "Kandyas",
                    age_display: "١٩ · ١٨/٦",
                    color_display: "💚 أخضر",
                    religion_display: "الإسلام",
                    study_display: "طب",
                    footer_islam: "الإسلام",
                    footer_medicine: "طب",
                    footer_green_only: "أخضر 💚",
                },
                en: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_name: "Kurds_Movies",
                    name_header: "NAME",
                    age_header: "AGE / BIRTH",
                    color_header: "FAV COLOR",
                    skills_header: "EXPERTISE",
                    religion_header: "RELIGION",
                    study_header: "FIELD",
                    name_display: "Kandyas",
                    age_display: "19 · 18/6",
                    color_display: "💚 Green",
                    religion_display: "Islam",
                    study_display: "Medicine",
                    footer_islam: "Islam",
                    footer_medicine: "Medicine",
                    footer_green_only: "Green 💚",
                }
            };

            function switchLang(lang) {
                // update all i18n elements
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.dataset.i18n;
                    if (dict[lang] && dict[lang][key] !== undefined) {
                        el.innerText = dict[lang][key];
                    }
                });

                // update active language pill
                document.querySelectorAll('.lang-pill').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === lang);
                });
            }

            // attach click listeners
            document.querySelectorAll('.lang-pill').forEach(btn => {
                btn.addEventListener('click', e => {
                    const lang = e.currentTarget.dataset.lang;
                    switchLang(lang);
                });
            });

            // start with Kurdish
            switchLang('ku');
        })();
    </script>
</body>
</html>
