<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KANDYAS | گەنجینەی زانست و ڕەنگەکان</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Cairo:wght@400;600;700&display=swap');

        body {
            background: #03050b;
            font-family: 'Space Grotesk', 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* پاشبنەمای جوڵاو - ڕەنگەکان لە هەموو شوێن */
        .rainbow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 30%, #1a0c2e, #030008);
            overflow: hidden;
        }

        .aurora-prism {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 20% 40%, rgba(255, 80, 120, 0.25), transparent 55%),
                        radial-gradient(circle at 80% 70%, rgba(80, 200, 255, 0.3), transparent 60%),
                        radial-gradient(circle at 40% 80%, rgba(255, 210, 80, 0.2), transparent 65%),
                        radial-gradient(circle at 70% 20%, rgba(180, 80, 255, 0.2), transparent 70%);
            animation: prismFlow 26s infinite alternate ease-in-out;
            filter: blur(75px);
            mix-blend-mode: screen;
        }

        @keyframes prismFlow {
            0% { transform: translate(0%, 0%) rotate(0deg); opacity: 0.6; }
            100% { transform: translate(-6%, -4%) rotate(2deg); opacity: 1; }
        }

        .grid-rainbow {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 100, 150, 0.08) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(100, 200, 255, 0.08) 1px, transparent 1px);
            background-size: 52px 52px;
            animation: gridWobble 22s linear infinite;
        }

        @keyframes gridWobble {
            0% { transform: translate(0, 0); }
            100% { transform: translate(52px, 52px); }
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* کارتی سەرەکی - شووشەی پڕ ڕەنگ */
        .neo-card {
            position: relative;
            z-index: 20;
            max-width: 1300px;
            width: 100%;
            background: rgba(6, 12, 22, 0.6);
            backdrop-filter: blur(18px);
            border-radius: 56px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 200, 100, 0.4) inset;
            padding: 2rem 2rem;
            transition: all 0.4s;
            border: 1px solid rgba(255, 180, 80, 0.5);
        }

        .neo-card:hover {
            box-shadow: 0 45px 90px rgba(0, 0, 0, 0.6), 0 0 0 3px rgba(255, 210, 120, 0.6) inset;
        }

        /* هێڵی سنووری ڕەنگاوڕەنگ */
        .neo-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 58px;
            background: linear-gradient(110deg, #ff4d6d, #ffb347, #ffd966, #6effb0, #4d9eff, #c56eff);
            z-index: -1;
            opacity: 0.3;
            transition: opacity 0.5s;
            filter: blur(12px);
        }
        .neo-card:hover::after {
            opacity: 0.7;
        }

        /* پانێلی زمان */
        .lang-panel {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .lang-pill {
            background: rgba(20, 25, 40, 0.7);
            border: 1px solid #ffbc6e;
            color: #fff2df;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.45rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.25s;
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(4px);
        }

        .lang-pill.active {
            background: linear-gradient(125deg, #ffaa44, #ff884d);
            border-color: #fff0cc;
            color: #121212;
            font-weight: 800;
            box-shadow: 0 0 18px #ffaa55;
        }

        /* لۆگۆ - سادەکراو، بێ whoami زیادە */
        .logo-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(255, 200, 100, 0.6);
        }

        .logo-name {
            font-size: clamp(2.8rem, 9vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #FFF2C0, #FFDC9A, #AAFFE6, #FFA07A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
            filter: drop-shadow(0 0 12px #ffbc6e);
            line-height: 1.1;
        }

        /* هیچ whoami زیادە لەم بەشەدا نییە */
        .logo-extra {
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 1rem;
            border-radius: 60px;
            color: #ffefcf;
            font-family: monospace;
        }

        /* سۆشیاڵ میدیا - ڕەنگی شەیدا */
        .social-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            margin: 2.2rem 0 2.5rem;
            justify-content: center;
        }

        .rainbow-brick {
            background: linear-gradient(125deg, #2a1b4d, #121d3a);
            border-radius: 50px;
            padding: 1rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            text-decoration: none;
            color: #fff9ef;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 18px 28px -12px #00000066, 0 0 0 1px #ffbd71 inset;
            transition: 0.3s;
            min-width: 220px;
            flex: 1 1 220px;
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(2px);
            position: relative;
            overflow: hidden;
        }

        .rainbow-brick::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,220,100,0.4), transparent);
            transition: left 0.5s;
        }

        .rainbow-brick:hover::before {
            left: 100%;
        }

        .rainbow-brick i {
            font-size: 2.2rem;
            filter: drop-shadow(0 0 3px gold);
        }

        .rainbow-brick:hover {
            transform: translateY(-8px);
            background: linear-gradient(125deg, #3a2c6e, #192a55);
            box-shadow: 0 28px 38px -12px #000, 0 0 0 2px #ffd894 inset;
        }

        /* گرید زانیاری - ڕەنگە جیاوازەکان */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 2rem;
        }

        .info-tile {
            background: rgba(12, 20, 32, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.5rem;
            transition: 0.25s;
            border: 1px solid;
            border-image: linear-gradient(145deg, #ff9966, #ff5e62) 1;
            box-shadow: 0 12px 28px -12px black;
        }

        /* هەر بلۆکێک ڕەنگی سنووری تایبەتی خۆی */
        .info-tile:nth-child(1) { border-color: #ff7e5e; }
        .info-tile:nth-child(2) { border-color: #f6d365; }
        .info-tile:nth-child(3) { border-color: #6bffb8; }
        .info-tile:nth-child(4) { border-color: #6ec3ff; }
        .info-tile:nth-child(5) { border-color: #c084fc; }
        .info-tile:nth-child(6) { border-color: #f97393; }

        .info-tile:hover {
            transform: translateY(-6px);
            background: rgba(20, 35, 48, 0.75);
            box-shadow: 0 20px 35px -10px black;
            border-color: #ffdd99;
        }

        .tile-header {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            color: #ffeaae;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .tile-header i {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #ffb347, #ff7e5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tile-content {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 600;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.6rem;
        }

        /* تەمەن و بەروار جیا کراوە */
        .age-block {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .age-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #fff2b5, #b5ffcf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .birth-text {
            font-size: 1rem;
            font-family: monospace;
            background: rgba(0, 50, 40, 0.6);
            padding: 0.2rem 0.9rem;
            border-radius: 60px;
            display: inline-block;
            border-left: 3px solid #ffcd7e;
        }

        .green-chip {
            background: linear-gradient(145deg, #0d7a4a, #0a5836);
            display: inline-block;
            padding: 0.2rem 1.8rem;
            border-radius: 70px;
            font-size: 1.5rem;
            border: 1px solid #b5ffb0;
            box-shadow: 0 0 22px #5effaa;
            color: #f0fff0;
            font-weight: 700;
        }

        .skill-pack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
        }

        .skill-tag {
            background: rgba(20, 45, 55, 0.8);
            border: 1px solid #ffbc6e;
            color: #fffaec;
            padding: 0.4rem 1.4rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            transition: 0.2s;
        }

        .skill-tag.special-tag {
            background: #185d6e;
            border-color: #7effe6;
            color: #e2ffff;
        }

        .skill-tag:hover {
            background: #ffb347;
            color: #111;
            transform: scale(1.02);
        }

        /* فووتهری سێ بەش (ئیسلام، پزیشکی، سەوز) */
        .footer-elegant {
            margin-top: 2rem;
            padding: 1.2rem 1.8rem;
            background: rgba(0, 20, 25, 0.7);
            border-radius: 50px;
            border: 1px solid #ffcd8c;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            backdrop-filter: blur(6px);
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
            background: rgba(0,0,0,0.25);
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            color: #fff2df;
        }

        .footer-item i {
            font-size: 1.4rem;
            filter: drop-shadow(0 0 2px #ffbc6e);
        }

        /* هیچ وتەی کۆتایی و هیچ whoami زیادە نییە */
        .signature-quote {
            display: none;
        }

        @media (max-width: 650px) {
            .neo-card {
                padding: 1.5rem;
            }
            .logo-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .tile-content {
                font-size: 1.3rem;
            }
            .green-chip {
                font-size: 1.2rem;
                padding: 0.2rem 1rem;
            }
            .age-number {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

        <div class="aurora-prism"></div>
        <div class="grid-rainbow"></div>

    <div class="neo-card">
        <!-- زمانەکان -->

        <!-- لۆگۆ - بێ هیچ whoami زیادە، تەنیا ناو -->
        <div class="logo-section">

            <span class="logo-extra"><i class="fas fa-infinity"></i>  vision</span>
        </div>

        <!-- سۆشیاڵ میدیا - ڕەنگاوڕەنگ -->
        <div class="social-row">
            <a href="https://t.me/i4m_SHAW" target="_blank" class="rainbow-brick">
                <i class="fab fa-telegram-plane"></i>
                <span data-i18n="telegram_user">@i4m_SHAW</span>
            </a>
            <a href="https://tiktok.com/@kandyasm" target="_blank" class="rainbow-brick">
                <i class="fab fa-tiktok"></i>
                <span data-i18n="tiktok_user">@kandyasm</span>
            </a>
            <a href="https://t.me/Kurds_Movies" target="_blank" class="rainbow-brick">
                <i class="fab fa-telegram-plane"></i>
                <span data-i18n="channel_name">Kurds_Movies</span>

        <!-- زانیاری فەرمی -->
        <div class="profile-grid">
            <!-- ناو -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-user-astronaut"></i> <span data-i18n="name_header">ناو</span></div>

            <!-- تەمەن و بەروار جیا کراوە -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-gem"></i> <span data-i18n="age_header">تەمەن & لەدایکبوون</span></div>
                <div class="tile-content">
                    <div class="age-block">
                        <span class="age-number" data-i18n="age_years">١٩ ساڵ</span>

            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-heart"></i> <span data-i18n="color_header">ڕەنگی دڵخواز</span></div>
                <div class="tile-content"><span class="green-chip" data-i18n="color_display">💚 سەوز</span></div>

            <!-- شارەزایی تەکنیکی -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-microchip"></i> <span data-i18n="skills_header">شارەزایی</span></div>
                <div class="skill-pack">
                    <span class="skill-tag">Python</span>
                    <span class="skill-tag">C</span>

                    <span class="skill-tag special-tag">کۆدینگ</span>
                </div>
            </div>

            <!-- ئایین -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-mosque"></i> <span data-i18n="religion_header">دین</span></div>
                <div class="tile-content" data-i18n="religion_display">ئیسلام</div>
            </div>

            <!-- خوێندن: پزیشکی -->
            <div class="info-tile">
                <div class="tile-header"><i class="fas fa-stethoscope"></i> <span data-i18n="study_header">ئاراستە</span></div>
                <div class="tile-content" data-i18n="study_display">پزیشکی</div>

        </div>

        <!-- فووتهری سێ بەش (ئیسلام، پزیشکی، سەوز) -->
        <div class="footer-elegant">
            <div class="footer-item"><i class="fas fa-crescent-moon"></i> <span data-i18n="footer_islam">ئیسلام</span></div>
            <div class="footer-item"><i class="fas fa-user-md"></i> <span data-i18n="footer_medicine">پزیشکی</span></div>
            <div class="footer-item"><i class="fas fa-leaf" style="color: #aaffaa;"></i> <span data-i18n="footer_green_only">سەوز 💚</span></div>
        </div>

        <!-- هیچ وتەیەکی زیادە نییە، بەتەواوی پاک کراوە -->
    </div>

    <script>
        (function() {
            // فەرهەنگی وەرگێڕان (هەر سێ زمان)
            const dict = {
                ku: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_name: "Kurds_Movies",
                    name_header: "ناو",
                    age_header: "تەمەن & لەدایکبوون",
                    color_header: "ڕەنگی دڵخواز",
                    skills_header: "شارەزایی",
                    religion_header: "دین",
                    study_header: "ئاراستە",
                    name_display: "Kandyas",
                    age_years: "١٩ ساڵ",
                    birth_date: "لەدایکبوون: ١٨ی حوزەیران",
                    color_display: "💚 سەوز",
                    religion_display: "ئیسلام",
                    study_display: "پزیشکی",
                    footer_islam: "ئیسلام",
                    footer_medicine: "پزیشکی",
                    footer_green_only: "سەوز 💚"
                },
                ar: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_name: "Kurds_Movies",
                    name_header: "الاسم",
                    age_header: "العمر & تاريخ الميلاد",
                    color_header: "اللون المفضل",
                    skills_header: "الخبرات",
                    religion_header: "الدين",
                    study_header: "التخصص",
                    name_display: "Kandyas",
                    age_years: "١٩ سنة",
                    birth_date: "الميلاد: ١٨ حزيران",
                    color_display: "💚 أخضر",
                    religion_display: "الإسلام",
                    study_display: "الطب",
                    footer_islam: "الإسلام",
                    footer_medicine: "الطب",
                    footer_green_only: "أخضر 💚"
                },
                en: {
                    telegram_user: "@i4m_SHAW",
                    tiktok_user: "@kandyasm",
                    channel_name: "Kurds_Movies",
                    name_header: "NAME",
                    age_header: "AGE & BIRTH",
                    color_header: "FAV COLOR",
                    skills_header: "EXPERTISE",
                    religion_header: "RELIGION",
                    study_header: "FIELD",
                    name_display: "Kandyas",
                    age_years: "19 years",
                    birth_date: "Born: June 18",
                    color_display: "💚 Green",
                    religion_display: "Islam",
                    study_display: "Medicine",
                    footer_islam: "Islam",
                    footer_medicine: "Medicine",
                    footer_green_only: "Green 💚"
                }
            };

            function switchLang(lang) {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.dataset.i18n;
                    if (dict[lang] && dict[lang][key] !== undefined) {
                        el.innerText = dict[lang][key];
                    }
                });
                document.querySelectorAll('.lang-pill').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === lang);
                });
            }

            document.querySelectorAll('.lang-pill').forEach(btn => {
                btn.addEventListener('click', e => {
                    const lang = e.currentTarget.dataset.lang;
                    switchLang(lang);
                });
            });
            switchLang('ku');

            // پارتیکڵەکانی پاشبنەما (ڕەنگاوڕەنگ)
            const canvas = document.getElementById('particle-canvas');
            let ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const PARTICLE_NUM = 150;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_NUM; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        rad: Math.random() * 2.8 + 1,
                        alpha: Math.random() * 0.5 + 0.2,
                        vx: (Math.random() - 0.5) * 0.2,
                        vy: (Math.random() - 0.5) * 0.12,
                        phase: Math.random() * Math.PI * 2,
                        hue: Math.random() * 360
                    });
                }
            }

            function drawParticles() {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                const now = Date.now();
                for (let p of particles) {
                    ctx.beginPath();
                    let glow = 0.5 + Math.sin(now * 0.002 + p.phase) * 0.4;
                    let hueShift = (p.hue + now * 0.1) % 360;
                    ctx.arc(p.x, p.y, p.rad + glow * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hueShift}, 80%, 65%, ${p.alpha * 0.7})`;
                    ctx.fill();
                    ctx.shadowBlur = 9;
                    ctx.shadowColor = `hsl(${hueShift}, 100%, 70%)`;
                    ctx.fillStyle = `hsla(${hueShift}, 85%, 60%, ${p.alpha * 0.5})`;
                    ctx.arc(p.x, p.y, p.rad * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < -30) p.x = width + 30;
                    if (p.x > width + 30) p.x = -30;
                    if (p.y < -30) p.y = height + 30;
                    if (p.y > height + 30) p.y = -30;
                }
                requestAnimationFrame(drawParticles);
            }

            window.addEventListener('resize', () => resizeCanvas());
            resizeCanvas();
            drawParticles();
        })();
    </script>
</body>
</html>
