<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANDYAS · MATRIX</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&family=Tajawal:wght@400;700&display=swap');

        body {
            background: #03060b;
            font-family: 'Inter', 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Matrix background effect (subtle, not overwhelming) */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
        }

        /* main card – dark glass, hacker vibe */
        .cyber-core {
            position: relative;
            z-index: 10;
            max-width: 1300px;
            width: 100%;
            background: rgba(5, 15, 12, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 200, 0.25);
            border-radius: 48px 48px 48px 48px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.9), 0 0 0 2px rgba(0, 255, 200, 0.1) inset, 0 0 60px #00ffff1a;
            padding: 2.8rem 2.5rem;
        }

        /* language selector – clean, minimal */
        .lang-strip {
            display: flex;
            justify-content: flex-end;
            gap: 1.2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .lang-switch {
            background: transparent;
            border: 1.2px solid #607b76;
            color: #bbf0e0;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 0.5rem 1.8rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.25s;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }
        .lang-switch.active {
            background: #00cc99;
            border-color: #aaffdd;
            color: #03100b;
            font-weight: 700;
            box-shadow: 0 0 25px #00ffb3;
        }
        .lang-switch:hover {
            border-color: #28ffc5;
            color: #ffffff;
            transform: scale(0.98);
        }

        /* logo – with code flair */
        .logo-hacker {
            margin-bottom: 2rem;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            border-left: 6px solid #00ffe1;
            padding-left: 2rem;
        }
        .logo-main {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d6fff2, #80ffdb, #40f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -2px;
            filter: drop-shadow(0 0 25px #00fff2);
        }
        .logo-tag {
            color: #75857f;
            font-size: 1.2rem;
            font-family: 'JetBrains Mono', monospace;
            margin-left: 0.8rem;
        }

        /* social bricks – blue rectangles (pure blue, not green) */
        .brick-wall {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            margin: 2.8rem 0 2.8rem;
            justify-content: center;
        }
        .brick-blue {
            background: linear-gradient(145deg, #0055ff, #0036b3);
            border: none;
            border-radius: 24px;
            padding: 1.4rem 2.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 20px 30px -5px #000f3b, 0 0 0 2px #7fc3ff inset, 0 -4px 0 #001d7a inset;
            transition: 0.25s ease;
            min-width: 240px;
            flex: 1 1 240px;
            font-family: 'JetBrains Mono', monospace;
        }
        .brick-blue i {
            font-size: 2.8rem;
            filter: drop-shadow(2px 4px 4px black);
        }
        .brick-blue.channel {
            background: linear-gradient(145deg, #1f3a7a, #10214f);
            box-shadow: 0 20px 30px -5px #030e24, 0 0 0 2px #60b5ff inset;
        }
        .brick-blue:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 32px 40px -8px #00123f, 0 0 0 3px #aae0ff inset;
        }

        /* info grid – neutral, minimal, with dark background */
        .info-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.8rem;
            margin: 2.5rem 0 2.5rem;
        }
        .cell {
            background: rgba(0, 20, 16, 0.6);
            backdrop-filter: blur(6px);
            border: 1px solid #1d6d5e;
            border-radius: 24px;
            padding: 1.5rem 1.8rem;
            transition: 0.2s;
            box-shadow: 0 12px 20px -10px black;
        }
        .cell:hover {
            border-color: #00ffe1;
            box-shadow: 0 0 25px #00ffff26;
            background: rgba(0, 30, 25, 0.7);
        }
        .cell-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #92ffe6;
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .cell-header i {
            font-size: 1.6rem;
            color: #15ffcf;
        }
        .cell-value {
            color: #f0fffa;
            font-size: 1.9rem;
            font-weight: 700;
            padding-left: 0.5rem;
            font-family: 'Inter', sans-serif;
        }
        /* favourite color special green block – but only that */
        .green-chip {
            background: #0e482e;
            display: inline-block;
            padding: 0.4rem 2rem;
            border-radius: 100px;
            font-size: 1.9rem;
            border: 2px solid #55ffa2;
            box-shadow: 0 0 25px #18ff8c;
            color: #e9ffec;
        }
        /* skills as tags – neutral colours */
        .skill-tray {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1rem;
            margin-top: 0.5rem;
        }
        .skill-badge {
            background: #142e28;
            border: 1px solid #10ccb0;
            color: #c6ffe6;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.4px;
            transition: 0.2s;
        }
        .skill-badge:hover {
            background: #10b594;
            color: #030f0b;
            border-color: white;
        }
        /* decoding / coding – will stay as is (no translation needed) */
        .skill-badge.plain {
            background: #1f3f48;
            border-color: #44ccff;
        }

        /* medicine & islam footer – simple */
        .footer-trim {
            margin-top: 3rem;
            padding: 1.5rem 2rem;
            background: rgba(0, 10, 8, 0.7);
            border-radius: 60px;
            border: 1px solid #308570;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            color: #b4ffe6;
            font-size: 1.3rem;
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(4px);
        }
        .footer-trim i {
            color: #19f0d0;
            font-size: 2rem;
            margin: 0 0.6rem;
        }
        .footer-trim span {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* unique hacker element */
        .glitch-line {
            width: 100%;
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            color: #00aa9a;
            margin-top: 1.2rem;
            opacity: 0.5;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="cyber-core">

            <button class="lang-switch active" data-lang="ku">کوردی</button>
            <button class="lang-switch" data-lang="ar">عربي</button>

        <!-- logo area -->
        <div class="logo-hacker">
            <span class="logo-main">KANDYAS</span>
            <span class="logo-tag">#root</span>
        </div>

        <!-- BLUE RECTANGLES (social) -->
        <div class="brick-wall" id="socialBricks">

            <a href="https://t.me/i4m_SHAW" target="_blank" class="brick-blue">
                <i class="fab fa-telegram"></i>
                <span data-i18n="telegram_personal">@i4m_SHAW</span>
            </a>
            <!-- tiktok -->
            <a href="https://tiktok.com/@kandyasm" target="_blank" class="brick-blue">

        <!-- personal info grid: ALL translations properly separated, no extra text -->
        <div class="info-matrix" id="infoMatrix">
            <!-- name -->
            <div class="cell">
                <div class="cell-header"><i class="fas fa-id-card"></i> <span data-i18n="name_label">NAW</span></div>

            <!-- age + birth -->

                    <!-- decoding & coding (always visible, no translation needed) -->
                    <span class="skill-badge plain">دیکۆدینگ</span>
                    <span class="skill-badge plain">کۆدینگ</span>
                </div>
            </div>
            <!-- religion islam -->
            <div class="cell">
                <div class="cell-header"><i class="fas fa-mosque"></i> <span data-i18n="religion_label">DIN</span></div>
                <div class="cell-value" data-i18n="religion_value">ئیسلام</div>
            </div>
            <!-- medicine aspiration -->
            <div class="cell">
                <div class="cell-header"><i class="fas fa-user-md"></i> <span data-i18n="study_label">ARASTE</span></div>
                <div class="cell-value" data-i18n="study_value">پزیشکی</div>

        </div>

        <!-- footer clean: no extra decoding or random numbers, just islam & medicine line -->
        <div class="footer-trim">
            <span><i class="fas fa-crescent-moon"></i> <span data-i18n="islam_line">ئیسلام · پزیشکی</span></span>

            <span><i class="fas fa-heart" style="color:#53ffa8;"></i> <span data-i18n="footer_green">سەوز 💚</span></span>

        <!-- unique hacker touch (just aesthetic) -->

    </div>

    <script>
        (function() {
            // ==================== TRANSLATIONS ====================
            const translations = {
                ku: {
                    // bricks
                    telegram_personal: "@i4m_SHAW",
                    tiktok: "@kandyasm",
                    telegram_channel: "Kurds_Movies",
                    // headers
                    name_label: "ناو",
                    age_label: "تەمەن / لەدایکبوون",
                    color_label: "ڕەنگی دڵخواز",
                    skills_label: "شارەزایی",
                    religion_label: "دین",
                    study_label: "ئاراستە",
                    // values
                    name_value: "Kandyas",
                    age_value: "١٩ · ١٨/٦",
                    color_value: "💚 سەوز",
                    religion_value: "ئیسلام",
                    study_value: "پزیشکی",
                    // footer lines (pure)
                    islam_line: "ئیسلام · پزیشکی",
                    decode_line: "دیکۆدینگ & کۆدینگ",
                    footer_green: "سەوز 💚",
                },
                ar: {
                    telegram_personal: "@i4m_SHAW",
                    tiktok: "@kandyasm",
                    telegram_channel: "Kurds_Movies",
                    name_label: "الاسم",
                    age_label: "العمر / الميلاد",
                    color_label: "اللون المفضل",
                    skills_label: "المهارات",
                    religion_label: "الدين",
                    study_label: "التخصص",
                    name_value: "Kandyas",
                    age_value: "١٩ · ١٨/٦",
                    color_value: "💚 أخضر",
                    religion_value: "الإسلام",
                    study_value: "طب",
                    islam_line: "الإسلام · طب",
                    decode_line: "ديكودينغ & كودينغ",
                    footer_green: "أخضر 💚",
                },
                en: {
                    telegram_personal: "@i4m_SHAW",
                    tiktok: "@kandyasm",
                    telegram_channel: "Kurds_Movies",
                    name_label: "NAME",
                    age_label: "AGE / BIRTH",
                    color_label: "FAV COLOR",
                    skills_label: "EXPERTISE",
                    religion_label: "RELIGION",
                    study_label: "FIELD",
                    name_value: "Kandyas",
                    age_value: "19 · 18/6",
                    color_value: "💚 Green",
                    religion_value: "Islam",
                    study_value: "Medicine",
                    islam_line: "Islam · Medicine",
                    decode_line: "Decoding & Coding",
                    footer_green: "Green 💚",
                }
            };

            function applyLanguage(lang) {
                // update all elements with data-i18n
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[lang] && translations[lang][key] !== undefined) {
                        el.innerText = translations[lang][key];
                    }
                });

                // update active class on language buttons
                document.querySelectorAll('.lang-switch').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === lang);
                });
            }

            // attach event listeners
            document.querySelectorAll('.lang-switch').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const lang = e.target.dataset.lang;
                    applyLanguage(lang);
                });
            });

            // set default (kurdish)
            applyLanguage('ku');
        })();
    </script>

    <!-- Matrix background effect (pure javascript) -->
    <script>
        (function matrixBackground() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
            const fontSize = 18;
            const columns = width / fontSize;
            const drops = [];
            for (let x = 0; x < columns; x++) drops[x] = 1;

            function draw() {
                ctx.fillStyle = 'rgba(3, 6, 11, 0.06)';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = '#0cf5b6';
                ctx.font = fontSize + 'px "JetBrains Mono", monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(draw, 45);
        })();
    </script>
</body>
</html>
